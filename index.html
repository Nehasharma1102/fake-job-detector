<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake Job Detector</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
    font-family: 'Poppins', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* Container */
.container {
    background: rgba(20, 20, 40, 0.7);
    backdrop-filter: blur(10px);
    padding: 40px;
    border-radius: 20px;
    width: 600px;
    text-align: center;
    box-shadow: 0 0 25px rgba(0, 212, 255, 0.15);
}

/* Title */
h1 {
    color: #00d4ff;
    margin-bottom: 10px;
    text-shadow: 0 0 6px rgba(0, 212, 255, 0.4);
}

p {
    color: #aaa;
    margin-bottom: 15px;
}

.confidence-bar {
    width: 100%;
    height: 10px;
    background: #222;
    border-radius: 10px;
    margin-top: 10px;
    overflow: hidden;
}

#confidenceFill {
    height: 100%;
    width: 0%;
    background: #00d4ff;
    transition: width 0.5s ease;
}

/* Textarea */
textarea {
    width: 100%;
    height: 200px;
    background: #05051a;
    color: #e2e8f0;
    border: 1px solid #00d4ff;
    border-radius: 10px;
    padding: 15px;
    font-size: 14px;
    outline: none;
    line-height: 1.5;
}

textarea::placeholder {
    color: #64748b;
}

textarea:focus {
    border: 1px solid #00e1ff;
    box-shadow: 0 0 8px rgba(0, 212, 255, 0.3);
}

/* Button */
button {
    margin-top: 20px;
    background: linear-gradient(90deg, #00d4ff, #00e1ff);
    color: #0a0a2e;
    border: none;
    padding: 15px;
    border-radius: 10px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    width: 100%;
    transition: 0.3s;
    box-shadow: 0 0 8px rgba(0, 212, 255, 0.3);
}

button:hover {
    transform: scale(1.05);
}

/* Result */
.result {
    margin-top: 20px;
    padding: 20px;
    border-radius: 10px;
    display: none;
    white-space: pre-line;
}

.fake {
    background: rgba(255, 0, 0, 0.15);
    border: 2px solid red;
}

.real {
    background: rgba(0, 255, 0, 0.15);
    border: 2px solid green;
}

.result h2 {
    font-size: 24px;
    margin-bottom: 10px;
}

/* Mobile */
@media(max-width: 600px){
    .container {
        width: 90%;
        padding: 20px;
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>🔍 Fake Job Detector</h1>

    <p>Protecting Women from Fake job offers 🚫</p>

    <textarea id="jobText" placeholder="Paste your job description here (include salary, company name, contact details)..."></textarea>

    
    <button id="btn" onclick="checkJob()">Check Now ✓</button>

    <div class="result" id="result">
        <h2 id="resultText"></h2>
        <p id="resultDesc"></p>

        <div class="confidence-bar">
    <div id="confidenceFill"></div>
</div>
    </div>
    <p style="margin-top:20px; color:#00d4ff; text-align:center; font-size:13px; opacity:0.7;">
    Powered by Team CodeNexa ⚡
</p>
</div>

<script>
async function checkJob() {

    const text = document.getElementById('jobText').value;
    const btn = document.getElementById('btn');

    if(text.trim() === '') {
        alert('Please paste some text first!');
        return;
    }

    btn.innerText = "Checking...";
    btn.disabled = true;

    try {
        const response = await fetch('/predict', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({text: text})
        });

        const data = await response.json();

        const result = document.getElementById('result');
        const resultText = document.getElementById('resultText');
        const resultDesc = document.getElementById('resultDesc');

        result.style.display = 'block';

        if(data.result === 'FAKE') {
            resultText.innerText = '⚠️ FAKE JOB DETECTED!';
            resultDesc.innerText =
                'Confidence: ' + data.confidence + '%\n' +
                'This job is suspicious!\n\n' +
                'Reasons: ' + (data.reasons ? data.reasons.join(", ") : "Not specified");

            result.className = 'result fake';

        } else {
            resultText.innerText = '✅ REAL JOB!';
            resultDesc.innerText =
                'Confidence: ' + data.confidence + '%\n' +
                'This job looks legitimate!';

            result.className = 'result real';
        }
        document.getElementById("confidenceFill").style.width = data.confidence + "%";

    } catch (error) {
        alert("Server error! Make sure backend is running.");
    }

    btn.innerText = "Check Now ✓";
    btn.disabled = false;
}
</script>

</body>
</html>
